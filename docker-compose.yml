x-common: &common
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576
  restart: unless-stopped
  networks:
    - bot-network

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: 5

x-env: &env
  env_file: .env

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: dd-testerswh-tgbot:latest
    container_name: dd-testerswh-tgbot
    hostname: dd-testerswh-tgbot
    init: true
    stop_grace_period: 20s
    <<: [*common, *logging, *env]
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    network_mode: bridge

networks:
  bot-network:
    name: dd-testerswh-tgbot-network
    driver: bridge
    external: false
    internal: false
